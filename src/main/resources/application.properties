spring.application.name=App
# Dòng này giúp Spring đọc file .env nếu có, nhưng khi chạy Docker thì biến từ docker-compose sẽ ưu tiên hơn
spring.config.import=optional:file:.env[.properties]

# --- Database ---
# Sử dụng biến DB_URL, nếu không có thì dùng mặc định localhost (để dev máy cá nhân)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ticket_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:password123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- RSA Keys ---
spring.app.rsa.private-key-path=classpath:certs/private_key.pem
spring.app.rsa.public-key-path=classpath:certs/public_key.pem

spring.threads.virtual.enabled=true

# --- Redis (SỬA Ở ĐÂY) ---
# Trong Docker, biến SPRING_DATA_REDIS_HOST sẽ truyền vào là "redis"
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379

# --- Kafka (SỬA Ở ĐÂY) ---
# Trong Docker, biến SPRING_KAFKA_BOOTSTRAP_SERVERS sẽ là "kafka:29092"
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.main.allow-bean-definition-overriding=true

# --- Email ---
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- RabbitMQ (SỬA Ở ĐÂY) ---
# Trong Docker, biến SPRING_RABBITMQ_HOST sẽ là "rabbitmq"
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Tối ưu Hibernate
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true